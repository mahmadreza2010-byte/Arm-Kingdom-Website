<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Website Request | ARM Kingdom</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#050816;
      color:white;
      min-height:100vh;
      overflow-x:hidden;
    }

    /* NAVBAR */

    .navbar{
      width:100%;
      padding:25px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:fixed;
      top:0;
      z-index:1000;
      background:rgba(5,8,22,0.85);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,0.05);
    }

    .logo{
      font-size:30px;
      font-weight:700;
      color:#4fc3ff;
    }

    .back-btn{
      text-decoration:none;
      color:white;
      border:1px solid rgba(255,255,255,0.08);
      padding:12px 22px;
      border-radius:14px;
      transition:0.3s;
    }

    .back-btn:hover{
      background:rgba(255,255,255,0.05);
    }

    /* FORM SECTION */

    .form-section{
      width:100%;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:140px 20px 80px;
      position:relative;
    }

    .glow{
      position:absolute;
      width:500px;
      height:500px;
      background:#0d6efd;
      filter:blur(180px);
      opacity:0.18;
      border-radius:50%;
      z-index:0;
    }

    .form-container{
      width:100%;
      max-width:850px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:30px;
      padding:50px;
      position:relative;
      z-index:2;
      backdrop-filter:blur(20px);
      box-shadow:0 20px 80px rgba(0,0,0,0.4);
    }

    .form-container h1{
      font-size:54px;
      margin-bottom:15px;
      line-height:1.1;
    }

    .form-container h1 span{
      color:#4fc3ff;
    }

    .form-container p{
      color:#9fb0c0;
      margin-bottom:40px;
      line-height:1.8;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    input,
    textarea,
    select{
      width:100%;
      padding:18px;
      border:none;
      outline:none;
      border-radius:18px;
      background:#0d1327;
      border:1px solid rgba(255,255,255,0.05);
      color:white;
      font-size:15px;
      transition:0.3s;
    }

    input:focus,
    textarea:focus,
    select:focus{
      border-color:#4fc3ff;
      box-shadow:0 0 20px rgba(79,195,255,0.2);
    }

    textarea{
      resize:vertical;
      min-height:140px;
    }

    button{
      width:100%;
      padding:20px;
      border:none;
      border-radius:18px;
      background:#4fc3ff;
      color:#02111d;
      font-size:17px;
      font-weight:700;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
    }

    button:hover{
      transform:translateY(-4px);
      box-shadow:0 15px 30px rgba(79,195,255,0.25);
    }

    .success-text{
      text-align:center;
      margin-top:10px;
      color:#8dd8ff;
      font-size:14px;
    }

    @media(max-width:900px){

      .form-container{
        padding:35px;
      }

      .form-container h1{
        font-size:42px;
      }

    }

    @media(max-width:600px){

      .navbar{
        padding:20px 5%;
      }

      .logo{
        font-size:24px;
      }

      .form-container{
        padding:28px;
      }

      .form-container h1{
        font-size:34px;
      }

    }

  </style>
</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="logo">
      ARM Kingdom
    </div>

    <a href="index.html" class="back-btn">
      Back Home
    </a>

  </header>

  <!-- FORM -->

  <section class="form-section">

    <div class="glow"></div>

    <div class="form-container">

      <h1>
        Start Your
        <span>Website Project</span>
      </h1>

      <p>
        Fill out the form below and ARM Kingdom will contact you about your custom website.
      </p>

      <form action="https://formsubmit.co/m.ahmadreza.2010@gmail.com" method="POST">

        <!-- HIDDEN SETTINGS -->

        <input type="hidden" name="_captcha" value="false">

        <input type="hidden" name="_template" value="table">

        <input type="hidden" name="_subject" value="New ARM Kingdom Website Request">

        <input type="hidden" name="_next" value="https://google.com">

        <!-- FORM INPUTS -->

        <input 
          type="text" 
          name="Full Name" 
          placeholder="Full Name"
          required
        >

        <input 
          type="email" 
          name="Email Address" 
          placeholder="Email Address"
          required
        >

        <input 
          type="text" 
          name="Business Name" 
          placeholder="Business Name"
        >

        <select name="Website Type">

          <option>Select Website Type</option>

          <option>Business Website</option>

          <option>E-Commerce Store</option>

          <option>Booking Website</option>

          <option>Portfolio Website</option>

          <option>Landing Page</option>

        </select>

        <textarea 
          name="Design Style"
          placeholder="Describe the website style you want..."
        ></textarea>

        <textarea 
          name="Features Needed"
          placeholder="What features do you need?"
        ></textarea>

        <textarea 
          name="Reference Websites"
          placeholder="Paste websites you like..."
        ></textarea>

        <select name="Budget">

          <option>Select Budget</option>

          <option>$100 - $300</option>

          <option>$300 - $700</option>

          <option>$700 - $1500</option>

          <option>$1500+</option>

        </select>

        <button type="submit">
          Submit Website Request
        </button>

        <div class="success-text">
          We usually respond within 24 hours.
        </div>

      </form>

    </div>

  </section>

</body>
</html>
